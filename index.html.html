<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Search</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: radial-gradient(circle at top, #1f2937, #020617);
        color: #f9fafb;
      }

      .card {
        width: min(480px, 100% - 3rem);
        background: rgba(15, 23, 42, 0.9);
        border-radius: 16px;
        padding: 2.25rem 2rem 2rem;
        box-shadow: 0 24px 60px rgba(15, 23, 42, 0.6);
        border: 1px solid rgba(148, 163, 184, 0.25);
        backdrop-filter: blur(18px);
      }

      .title {
        font-size: 1.5rem;
        font-weight: 650;
        letter-spacing: 0.03em;
        margin-bottom: 0.5rem;
      }

      .subtitle {
        font-size: 0.9rem;
        color: #9ca3af;
        margin-bottom: 1.5rem;
      }

      .timer {
        font-size: 0.85rem;
        color: #e5e7eb;
        margin-bottom: 1.25rem;
        display: flex;
        align-items: center;
        gap: 0.4rem;
      }

      .timer-label {
        text-transform: uppercase;
        letter-spacing: 0.12em;
        font-size: 0.72rem;
        color: #6b7280;
      }

      .timer-value {
        font-variant-numeric: tabular-nums;
        font-weight: 600;
        background: rgba(15, 23, 42, 0.8);
        padding: 0.2rem 0.6rem;
        border-radius: 999px;
        border: 1px solid rgba(55, 65, 81, 0.8);
      }

      .search-form {
        display: flex;
        flex-direction: column;
        gap: 0.8rem;
      }

      .search-input {
        width: 100%;
        padding: 0.8rem 0.9rem;
        border-radius: 999px;
        border: 1px solid rgba(75, 85, 99, 0.9);
        background-color: rgba(15, 23, 42, 0.9);
        color: #e5e7eb;
        font-size: 0.95rem;
        outline: none;
        transition: border-color 0.15s ease, box-shadow 0.15s ease,
          background-color 0.15s ease;
      }

      .search-input::placeholder {
        color: #6b7280;
      }

      .search-input:focus {
        border-color: #38bdf8;
        box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
        background-color: rgba(15, 23, 42, 1);
      }

      .actions {
        display: flex;
        gap: 0.75rem;
        flex-wrap: wrap;
      }

      .primary-button {
        flex: 1 1 140px;
        padding: 0.8rem 1.2rem;
        border-radius: 999px;
        border: none;
        cursor: pointer;
        font-size: 0.95rem;
        font-weight: 600;
        letter-spacing: 0.03em;
        text-transform: uppercase;
        background: linear-gradient(135deg, #38bdf8, #6366f1);
        color: #0b1120;
        box-shadow: 0 12px 30px rgba(37, 99, 235, 0.5);
        transition: transform 0.12s ease, box-shadow 0.12s ease,
          filter 0.12s ease;
      }

      .primary-button:hover {
        transform: translateY(-1px);
        box-shadow: 0 18px 40px rgba(37, 99, 235, 0.7);
        filter: brightness(1.05);
      }

      .primary-button:active {
        transform: translateY(0);
        box-shadow: 0 8px 20px rgba(37, 99, 235, 0.6);
      }

      .note {
        margin-top: 1.1rem;
        font-size: 0.78rem;
        color: #6b7280;
      }

      @media (max-width: 480px) {
        .card {
          padding: 1.75rem 1.4rem 1.6rem;
          border-radius: 14px;
        }

        .title {
          font-size: 1.3rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="card">
      <h1 class="title">Google search</h1>
      <p class="subtitle">Type anything and search the web instantly.</p>

      <div class="timer">
        <span class="timer-label">Time on page</span>
        <span class="timer-value" id="timer">00:00</span>
      </div>

      <form
        action="https://google.com/search"
        method="GET"
        class="search-form"
      >
        <input
          class="search-input"
          type="text"
          name="q"
          placeholder="Search on Google..."
          autocomplete="off"
          autofocus
          required
        />
        <div class="actions">
          <button type="submit" class="primary-button">Google search</button>
        </div>
      </form>

      <p class="note">
        This search box sends your query directly to Google in a new page.
      </p>
    </main>

    <script>
      let secondsOnPage = 0;
      const timerElement = document.getElementById("timer");

      function updateTimer() {
        secondsOnPage += 1;
        const minutes = Math.floor(secondsOnPage / 60)
          .toString()
          .padStart(2, "0");
        const seconds = (secondsOnPage % 60).toString().padStart(2, "0");
        timerElement.textContent = minutes + ":" + seconds;
      }

      setInterval(updateTimer, 1000);
    </script>
  </body>
</html>
